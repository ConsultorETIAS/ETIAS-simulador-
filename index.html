.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}

function chatWithETIAS(messages, lang) {
  var system = 'Eres ETIAS Assistant de "' + CONFIG.CONSULTANT_NAME + '" (' + CONFIG.CONSULTANT_EMAIL + ').\n' +
    'IDIOMA: ' + (lang==="es"?"español":lang==="pt"?"portugués brasileño":"inglés") + '.\n' +
    'OBJETIVO: Cerrar el trámite — que el viajero contrate el servicio.\n' +
    'TARIFA: €20 oficial ETIAS + ' + CONFIG.CONSULTANT_FEE + ' tarifa del agente.\n' +
    'MARCO LEGAL: Art. 67 Reg. UE 2018/1240. Lanzamiento Q4 2026.\n' +
    'FLUJO: 1)Saluda brevemente 2)Pregunta nacionalidad+destino 3)Confirma elegibilidad (MX✅ BR✅ AR✅ CO✅) 4)Explica valor en 2 líneas 5)Presenta tarifa 6)Si acepta→INICIAR_SIMULADOR.\n' +
    'REGLAS: Máx 3 líneas/respuesta. Nunca prometas aprobación. Si visa rechazada/deportación/antecedentes→ESCALAR_CONSULTOR.\n' +
    'SEÑALES DE CIERRE→INICIAR_SIMULADOR: sí,quiero,contrato,yes,I want,sim,quero,acepto,ok,dale,claro,adelante,vamos,proceed.';
  return fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:300,system:system,messages:messages})
  }).then(function(r){return r.json();}).then(function(d){return d.content&&d.content[0]?d.content[0].text:"";});
}

function ocrPassport(base64, mediaType) {
  return fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
      {type:"text",text:'Extract passport fields. Return ONLY JSON:\n{"surname":"","given_names":"","nationality":"","date_of_birth":"YYYY-MM-DD","sex":"M or F","passport_number":"","expiry_date":"YYYY-MM-DD","issuing_country":""}'}
    ]}]})
  }).then(function(r){return r.json();}).then(function(d){
    var text = d.content&&d.content[0]?d.content[0].text:"{}";
    return JSON.parse(text.replace(/```json|```/g,"").trim());
  });
}

function submitToGoogleForm(expId, travelerData) {
  var url = "https://docs.google.com/forms/d/e/" + CONFIG.GOOGLE_FORM_ID + "/formResponse";
  var E = CONFIG.ENTRIES;
  var body = new URLSearchParams();
  body.append(E.exp_id, expId);
  body.append(E.fecha, new Date().toISOString().split("T")[0]);
  body.append(E.consultor, CONFIG.CONSULTANT_NAME);
  body.append(E.viajero, ((travelerData.fname||"") + " " + (travelerData.lname||"")).trim());
  body.append(E.email_viajero, travelerData.travelerEmail||travelerData.email||"");
  body.append(E.pasaporte, travelerData.pnum||"");
  body.append(E.destino, travelerData.destination||"");
  body.append(E.llegada, travelerData.arrival||"");
  body.append(E.nacionalidad, travelerData.nationality||"");
  return fetch(url, {method:"POST",mode:"no-cors",body:body});
}

function runValidation() {
  var rep = S.rep, tv = S.tv;
  var now = new Date();
  var arrival = new Date(tv.arrival);
  var expiry = new Date(tv.pexpiry);
  var t3m = new Date(arrival);
  t3m.setMonth(t3m.getMonth()+3);
  return {
    d1:[
      {k:"d1_1",p:true},
      {k:"d1_2",p:!!rep.travelerEmail && rep.travelerEmail !== CONFIG.CONSULTANT_EMAIL},
      {k:"d1_3",p:!!rep.travelerName}
    ],
    d2:[
      {k:"d2_1",p:!!tv.pexpiry && expiry>t3m},
      {k:"d2_2",p:!!tv.arrival && arrival>now},
      {k:"d2_3",p:true}
    ],
    d3:[
      {k:"d3_1",p:!tv.prev_refused && !tv.prev_deported && !tv.criminal},
      {k:"d3_2",p:!!tv.pnum && !!tv.fname},
      {k:"d3_3",p:true}
    ],
    d4:[
      {k:"d4_1",p:true},
      {k:"d4_2",p:!!rep.travelerEmail},
      {k:"d4_3",p:true}
    ]
  };
}

// ============================================================
// STEP 4: VALIDATION
// ============================================================
function renderStep4() {
  var t = T[S.lang], V = t.val;
  var checks = runValidation();
  var cols = {d1:"#3b82f6",d2:"#8b5cf6",d3:"#f59e0b",d4:"#10b981"};
  var hasFail = false;
  Object.values(checks).forEach(function(arr){arr.forEach(function(c){if(!c.p)hasFail=true;});});
  var cardsHtml = Object.keys(checks).map(function(d){
    var items = checks[d];
    return '<div style="border:2px solid '+cols[d]+'40;border-radius:10px;padding:12px;background:'+cols[d]+'10">'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">'
      +'<span style="background:'+cols[d]+';color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px">'+esc(V.dNames[d])+'</span>'
      +'<span style="font-size:10px;color:#6b7280">'+esc(V.dDescs[d])+'</span>'
      +'</div>'
      +items.map(function(item){
        return '<div style="display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid #f3f4f6">'
          +'<span style="font-size:13px">'+(item.p?"✅":"❌")+'</span>'
          +'<span style="font-size:11px;color:'+(item.p?"#374151":"#ef4444")+';font-weight:'+(item.p?400:600)+'">'+esc(V.checks[item.k])+'</span>'
          +'</div>';
      }).join('')
      +'</div>';
  }).join('');
  return '<div>'
    +'<h2 style="font-size:20px;font-weight:800;color:#1a3a5c;margin-bottom:4px">'+esc(V.title)+'</h2>'
    +'<p style="font-size:13px;color:#6b7280;margin-bottom:18px">'+esc(V.sub)+'</p>'
    +'<div class="grid2" style="margin-bottom:18px">'+cardsHtml+'</div>'
    +'<div style="padding:13px;border-radius:10px;background:'+(hasFail?"#fef2f2":"#f0fdf4")+';border:2px solid '+(hasFail?"#fca5a5":"#86efac")+';margin-bottom:18px">'
    +'<p style="font-weight:800;color:'+(hasFail?"#ef4444":"#16a34a")+';font-size:14px;margin:0">'+(hasFail?esc(V.fail):esc(V.ok))+'</p>'
    +(hasFail?'<p style="font-size:11px;color:#b91c1c;margin-top:4px;margin-bottom:0">'+esc(V.failDesc)+'</p>':'')
    +'</div>'
    +'<button class="btn btn-navy" '+(hasFail?"disabled":"")+' onclick="if(!this.disabled)setStep(5)">'+esc(V.next)+'</button>'
    +'</div>';
}

    +'<h2 style="font-size:20px;font-weight:800;color:#1a3a5c;margin-bottom:4px">'+esc(R.title)+'</h2>'
    +'<p style="font-size:13px;color:#6b7280;margin-bottom:14px">'+esc(R.sub)+'</p>'
    +'<div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:11px;margin-bottom:14px;font-size:12px;color:#92400e;font-weight:600">'+esc(R.warn)+'</div>'
    +'<div class="grid2" style="margin-bottom:18px">'
    +'<div style="background:#f0f9ff;border-radius:10px;padding:13px;border:1.5px solid #0ea5e9">'

    +'</div>'
    +'<div style="background:#f9fafb;border-radius:10px;padding:13px">'
    +'<div class="section-label">'+esc(R.tLabel)+'</div>'
    +row("Nombre",(tv.fname||"")+" "+(tv.lname||""))+row("Email",rep.travelerEmail)+row("DOB",tv.dob)+row("Nacionalidad",tv.nationality)+row("Pasaporte",tv.pnum)+row("Vence",tv.pexpiry)+row("Destino",tv.destination)+row("Llegada",tv.arrival)
    +'</div></div>'
    +'<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:11px;margin-bottom:18px;display:flex;gap:8px;align-items:center">'
    +'<span>✅</span><span style="font-size:13px;color:#16a34a;font-weight:700">'+esc(R.valOk)+'</span>'

}

// ============================================================
// STEP 6: CONFIRM
// ============================================================
function renderStep6() {
  var t = T[S.lang], C = t.conf;
  var badge = {
    idle:    {bg:"#fef3c7",color:"#92400e",icon:"📤",text:"Preparando envío..."},
    sending: {bg:"#fef3c7",color:"#92400e",icon:"📤",text:"Enviando a Google Sheets..."},
    sent:    {bg:"#f0fdf4",color:"#16a34a",icon:"✅",text:"Expediente registrado · Notificación enviada a Gmail"},
    error:   {bg:"#fef2f2",color:"#ef4444",icon:"⚠️",text:"Error de envío — verifica que el Form esté activo"}
  }[S.formStatus]||{bg:"#fef3c7",color:"#92400e",icon:"📤",text:""};
  var pdfBtnText = S.pdfStatus==="idle"?"⬇ ES / EN / PT":S.pdfStatus==="generating"?"⏳ "+C.pdfGen:"✓ "+C.pdfOk;
  return '<div style="text-align:center">'
    +'<div style="font-size:52px;margin-bottom:10px">🇪🇺</div>'
    +'<h2 style="font-size:24px;font-weight:800;color:#1a3a5c;margin-bottom:6px">'+esc(C.title)+'</h2>'
    +'<p style="font-size:14px;color:#6b7280;margin-bottom:16px">'+esc(C.sub)+'</p>'
    +'<div style="background:#1a3a5c;color:#C9A84C;border-radius:10px;padding:13px 26px;display:inline-block;margin-bottom:16px;font-family:monospace;font-size:16px;font-weight:800;letter-spacing:0.2em">'+esc(C.idLabel)+': '+esc(S.expId)+'</div>'
    +'<div style="background:'+badge.bg+';border-radius:10px;padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;text-align:left">'
    +'<span style="font-size:22px;flex-shrink:0">'+badge.icon+'</span>'
    +'<div><p style="font-size:13px;font-weight:700;color:'+badge.color+';margin:0">'+esc(badge.text)+'</p>'
    +(S.formStatus==="sent"?'<p style="font-size:11px;color:#6b7280;margin:3px 0 0">ID <code style="font-family:monospace">'+esc(S.expId)+'</code> en tu Google Sheets</p>':'')
    +'</div></div>'
    // PDF buttons
    +'<div style="background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border:2px solid #0ea5e9;border-radius:12px;padding:20px;margin-bottom:16px">'
    +'<p style="font-size:13px;font-weight:800;color:#0369a1;margin-bottom:14px">📄 '+esc(C.pdfTitle)+'</p>'
    +'<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'
    +['es','en','pt'].map(function(l){
        var label = l==="es"?"ES — Español":l==="en"?"EN — English":"PT — Português";
        return '<button onclick="doPDF(\''+l+'\')" '+(S.pdfStatus==="generating"?"disabled":"")
          +' style="background:'+(S.pdfStatus==="generating"?"#d1d5db":"#0369a1")+';color:#fff;border:none;border-radius:8px;padding:10px 16px;font-weight:700;font-size:12px;cursor:'+(S.pdfStatus==="generating"?"not-allowed":"pointer")+'">⬇ '+esc(label)+'</button>';
      }).join('')
    +'</div>'
    +(S.pdfStatus==="ready"?'<p style="font-size:12px;color:#16a34a;font-weight:700;margin-top:10px;margin-bottom:0">✓ '+esc(C.pdfOk)+'</p>':'')
    +'</div>'
    // Next steps
    +'<div style="background:#f9fafb;border-radius:10px;padding:16px;text-align:left;margin-bottom:16px">'
    +'<div style="font-size:10px;font-weight:800;color:#C9A84C;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px">Next steps</div>'
    +C.steps.map(function(s){return '<p style="font-size:12px;color:#374151;margin-bottom:7px;padding-left:10px;border-left:3px solid #C9A84C">'+esc(s)+'</p>';}).join('')

// ============================================================
// MAIN RENDER
// ============================================================
function render() {
  var stepContent = "";
  if(S.step===0) stepContent = renderStep0();
  else if(S.step===1) stepContent = renderStep1();
  else if(S.step===2) stepContent = renderStep2();
  else if(S.step===3) stepContent = renderStep3();
  else if(S.step===4) stepContent = renderStep4();
  else if(S.step===5) stepContent = renderStep5();
  else if(S.step===6) stepContent = renderStep6();

  document.getElementById("app").innerHTML =
    '<div style="max-width:860px;margin:0 auto;padding:18px 14px">'
    + renderHeader()
    + renderExpBadge()
    + '<div class="card">'
    + renderProgress()
    + stepContent
    + '</div>'
    + '<p style="text-align:center;font-size:9px;color:rgba(255,255,255,0.2);margin-top:12px">Modelo B · ETIAS Agente Autorizado · Vanilla JS · Q4 2026</p>'
    + '</div>';

  // Scroll chat to bottom
  if(S.step===0) {
    var box = document.getElementById("chat-box");
    if(box) box.scrollTop = box.scrollHeight;
  }
}

// ============================================================
// ACTIONS
// ============================================================
function setLang(l) { S.lang=l; render(); }

function setStep(n) { S.step=n; render(); initStep(n); }

function initStep(n) {
  if(n===0 && S.chatMessages.length===0) {
    // Auto-greet
    S.chatLoading=true; render();
    chatWithETIAS([{role:"user",content:"Hola"}],S.lang).then(function(r){
      S.chatMessages=[{role:"assistant",content:r}];
      S.chatLoading=false; render();
    }).catch(function(){
      S.chatMessages=[{role:"assistant",content:"¡Hola! Soy el Asistente ETIAS. ¿De qué país eres y a dónde quieres viajar?"}];
      S.chatLoading=false; render();
    });
  }
  if(n===6 && !S.formSent) {
    S.formSent=true;
    S.formStatus="sending"; render();
    var data = Object.assign({},S.tv,{travelerEmail:S.rep.travelerEmail});
    submitToGoogleForm(S.expId, data)
      .then(function(){S.formStatus="sent";render();})
      .catch(function(){S.formStatus="error";render();});
  }
}

function doChat() {
  var input = S.chatInput.trim();
  if(!input || S.chatLoading) return;
  var userMsg = {role:"user",content:input};
  S.chatMessages.push(userMsg);
  S.chatInput=""; S.chatLoading=true; render();
  chatWithETIAS(S.chatMessages, S.lang).then(function(reply){
    if(reply.includes("INICIAR_SIMULADOR")){
      var allText = S.chatMessages.map(function(m){return m.content;}).join(" ").toLowerCase();
      var nat = ETIAS_NAT.find(function(n){return allText.includes(n);})||"";
      var confirm_msg = S.lang==="es"?"¡Perfecto! Abriendo el formulario...":S.lang==="pt"?"Perfeito! Abrindo o formulário...":"Perfect! Opening the form...";
      S.chatMessages.push({role:"assistant",content:confirm_msg});
      if(nat) S.tv.nationality=nat;
      S.chatLoading=false; render();
      setTimeout(function(){setStep(1);},1200);
      return;
    }
    if(reply.includes("ESCALAR_CONSULTOR")){
      S.chatEscalate=true;
      var esc_msg = S.lang==="es"?"Este caso requiere atención directa del agente.":S.lang==="pt"?"Este caso requer atenção do agente.":"This case requires direct agent attention.";
      S.chatMessages.push({role:"assistant",content:esc_msg});
      S.chatLoading=false; render();
      return;
    }
    S.chatMessages.push({role:"assistant",content:reply});
    S.chatLoading=false; render();
  }).catch(function(){
    S.chatMessages.push({role:"assistant",content:"Lo siento, hubo un error de conexión. Puedes continuar directamente al formulario."});
    S.chatLoading=false; render();
  });
}

function handlePassFile(file) {
  if(!file) return;
  S.passStatus="processing"; S.passPreview=null; S.passOcr=null; render();
  var reader = new FileReader();
  reader.onload = function(e){
    var dataUrl = e.target.result;
    S.passPreview = dataUrl;
    ocrPassport(dataUrl.split(",")[1], file.type)
      .then(function(ocr){
        S.passOcr=ocr; S.passStatus="success";
        // Pre-fill traveler data
        if(ocr.given_names) S.tv.fname=ocr.given_names;
        if(ocr.surname) S.tv.lname=ocr.surname;
        if(ocr.date_of_birth) S.tv.dob=ocr.date_of_birth;
        if(ocr.nationality) S.tv.nationality=ocr.nationality;
        if(ocr.passport_number) { S.tv.pnum=ocr.passport_number; S.rep.passportNumber=ocr.passport_number; }
        if(ocr.expiry_date) S.tv.pexpiry=ocr.expiry_date;
        if(ocr.issuing_country) S.tv.pcountry=ocr.issuing_country;
        if(ocr.sex) S.tv.gender = ocr.sex==="M"?0:1;
        render();
      })
      .catch(function(){ S.passStatus="error"; render(); });
  };
  reader.readAsDataURL(file);
}

function confirmPassport() {
  setStep(3);
}

function confirmAndSubmit() {
  setStep(6);
}

function doPDF(lang) {
  S.pdfStatus="generating"; render();
  try {
    var data = Object.assign({},S.tv,{travelerEmail:S.rep.travelerEmail,relation:S.rep.relation});
    generatePDF(data, lang, S.expId);
    S.pdfStatus="ready"; render();
    setTimeout(function(){S.pdfStatus="idle";render();},4000);
  } catch(e) {
    console.error(e);
    S.pdfStatus="idle"; render();
  }
}

function resetAll() {
  S.step=0; S.expId="ETIAS-"+Date.now().toString(36).toUpperCase();
  S.chatMessages=[]; S.chatInput=""; S.chatLoading=false; S.chatEscalate=false; S.chatStarted=false;
  S.rep={travelerName:"",travelerEmail:"",passportNumber:"",relation:0};
  S.passStatus="idle"; S.passPreview=null; S.passOcr=null;
  S.tv={fname:"",lname:"",dob:"",nationality:"",gender:0,pnum:"",pissue:"",pexpiry:"",pcountry:"",destination:"",arrival:"",purpose:0,prev_refused:false,prev_deported:false,criminal:false};
  S.pdfStatus="idle"; S.formStatus="idle"; S.formSent=false;
  render(); initStep(0);
}

// ============================================================
// BOOT
// ============================================================
render();
initStep(0);
</script>
